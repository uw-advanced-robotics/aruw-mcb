before_script:
  - python -V # Print out python version for debugging

cpplint:
  image: aruw/mcb-2020-gitlab-ci:latest
  before_script:
    - chmod +x ./.gitlab/linter.sh
  script:
    - ./.gitlab/linter.sh
  only:
  - merge_requests
  - master
  - develop

build-code:
  image: aruw/mcb-2020-gitlab-ci:latest
  script:
    - cd mcb-2019-2020-project # Go to robot code diretory
    - rm -r modm # Because lbuild clean is broken
    - lbuild build # Make sure that modm is setup for linux.
    - mkdir robot-type
    - 'for robot in SOLDIER HERO ENGINEER SENTINEL DRONE; do echo "Building $robot..." && echo -e "#ifndef __ROBOT_TYPE_HPP__\n#define __ROBOT_TYPE_HPP__\n#define TARGET_$robot\n#endif" > robot-type/robot_type.hpp && /usr/bin/env python3 $(which scons) build; done # Build the robot code!'
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  only:
    - merge_requests
    - master
    - develop